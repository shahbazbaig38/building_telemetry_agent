<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Building Telemetry Assistant</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 1.5rem; }
    input, textarea { width: 100%; padding: 0.5rem; margin-top: 0.25rem; }
    button { padding: 0.5rem 1rem; margin-top: 0.75rem; }
    pre { margin-top: 1rem; background: #f5f5f5; padding: 1rem; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>Building Telemetry SQL Assistant</h1>
  <p>Enter a natural language question and the agent will generate and run a SELECT query on telemetry data.</p>

  <label for="query">Question:</label>
  <input id="query" type="text" placeholder="e.g. Average indoor temperature last hour" />
  <button id="run">Run</button>

  <h2>SQL</h2>
  <pre id="sql"></pre>

  <h2>Result</h2>
  <pre id="output"></pre>

  <h2>Explanation</h2>
  <pre id="explanation"></pre>

  <script>
    document.getElementById('run').onclick = async () => {
      const queryElem = document.getElementById('query');
      const sqlElem = document.getElementById('sql');
      const outputElem = document.getElementById('output');
      const explanationElem = document.getElementById('explanation');

      const query = queryElem.value.trim();
      if (!query) {
        outputElem.textContent = 'Please enter a question.';
        return;
      }

      // clear previous values for the next query
      sqlElem.textContent = '';
      explanationElem.textContent = '';
      outputElem.textContent = 'Loading...';

      try {
        const r = await fetch('http://localhost:8000/api/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query }),
        });

        if (!r.ok) {
          const e = await r.json();
          document.getElementById('output').textContent = `Error: ${e.detail || r.statusText}`;
          return;
        }

        const data = await r.json();
        document.getElementById('sql').textContent = data.sql;
        document.getElementById('output').textContent = data.result;
        document.getElementById('explanation').textContent = data.explanation;
      } catch (err) {
        document.getElementById('output').textContent = 'Network error: ' + err;
      }
    };
  </script>
</body>
</html>
